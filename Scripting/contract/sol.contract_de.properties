sol.contract.contract.created=hat einen neuen Vertrag angelegt.
sol.contract.contract.approvalInitiated=hat einen Freigabeprozess eingeleitet.<div class="description blue">Bemerkung: {0}</div>
sol.contract.contract.immediateApproval=hat die Freigabe eingeleitet.<div class="description blue">Bemerkung: {0}</div>
sol.contract.contract.approved=hat den Vertrag freigegeben.<div class="description green">Bemerkung: {0}</div>
sol.contract.contract.approvalRejected=hat die Freigabe abgelehnt.<div class="description red">Bemerkung: {0}</div>
sol.contract.contract.approvalCompleted=hat den Freigabeprozess abgeschlossen.
